name: selenium_tutorial
on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: '3.12.8'

      - name: Install system dependencies (Chromium + Chromedriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          chromium-browser --version || true
          chromedriver --version || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests and produce report
        run: |
          cd tests
          mkdir -p reports
          # ensure tests use CI-friendly browser options (headless) in test code
          pytest test_login_page.py --browser=chrome --html=reports/reports.html || true
          echo "==== reports contents ===="
          ls -la reports || true

      - name: Set artifact path output
        id: results
        run: echo "artifactPath=tests/reports/" >> $GITHUB_OUTPUT

      - name: Upload tests report
        uses: actions/upload-artifact@v4
        with:
          name: tests-report
          path: ${{ steps.results.outputs.artifactPath }}
