name: selenium_tutorial
on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v3
        with:
          python-version: '3.12.8'

      - name: Install system dependencies (Google Chrome)
        run: |
          sudo apt-get update
          # Add Google Chrome repo and install stable Chrome
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Some repos use 'requirements.txt' and others use 'requirement.txt'
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirement.txt ]; then
            pip install -r requirement.txt
          else
            echo "No requirements file found; skipping pip install"
          fi

      - name: Run tests and produce report
        run: |
          cd tests
          mkdir -p reports
          # ensure tests use CI-friendly browser options (headless) in test code
          pytest test_login_page.py --browser=chrome --html=reports/reports.html || true
          echo "==== reports contents ===="
          ls -la reports || true

      - name: Set artifact path output
        id: results
        run: echo "artifactPath=tests/reports/" >> $GITHUB_OUTPUT

      - name: Upload tests report
        uses: actions/upload-artifact@v4
        with:
          name: tests-report
          path: ${{ steps.results.outputs.artifactPath }}
